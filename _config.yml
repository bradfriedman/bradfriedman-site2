about_content: | # this will include new lines to allow paragraphs
  Hi, my name's Brad and I'm a software engineer. I specialize in leading full-stack web service teams both as senior IC and manager. I'm also an AI enthusiast, particularly in the field of LLMs.

  As an IC, my expertise is in backend web services written in <mark>Python</mark>, built on <mark>AWS</mark> or <mark>GCP</mark> cloud infrastructure.

